<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>どうぶつ かぞえ | まなびランド</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../common/back-to-hub.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 花火キャンバス -->
<canvas id="fireworks-canvas"></canvas>

<!-- ===== メニュー ===== -->
<div class="screen active" id="screen-menu">
  <!-- ハブへ戻るボタン（メニュー内） -->
  <a href="../../index.html" class="menu-hub-btn">🏠 ぜんたいメニューへ</a>

  <div class="menu-animals-row" id="menu-animals"></div>
  <div class="menu-title-wrap">
    <div class="menu-title-badge">🐾 どうぶつ かぞえ 🐾</div>
    <p class="menu-subtitle">たしざん・ひきざんで あそぼう！</p>
  </div>
  <button class="btn-start" onclick="showScreen('setup'); speak('もんだいのせっていをしよう！')">
    ▶ はじめる
  </button>
</div>

<!-- ===== セットアップ ===== -->
<div class="screen" id="screen-setup">
  <div class="setup-inner">
    <h2 class="setup-title">⚙️ せってい</h2>

    <div class="setup-section">
      <p class="setup-label">もんだいのしゅるい</p>
      <div class="toggle-group" id="tg-mode">
        <button class="toggle-btn active" data-value="add" onclick="selectOpt('mode','add',this)">🐾 あわせて なんひき？</button>
        <button class="toggle-btn" data-value="sub" onclick="selectOpt('mode','sub',this)">🐾 のこりは なんひき？</button>
      </div>
    </div>

    <div class="setup-section">
      <p class="setup-label">こたえかた</p>
      <div class="toggle-group" id="tg-answerType">
        <button class="toggle-btn active" data-value="4" onclick="selectOpt('answerType','4',this)">📋 4つから えらぶ</button>
        <button class="toggle-btn" data-value="input" onclick="selectOpt('answerType','input',this)">✏️ こたえを にゅうりょく</button>
      </div>
    </div>

    <div class="setup-section">
      <p class="setup-label">レベル</p>
      <div class="toggle-group" id="tg-level">
        <button class="toggle-btn active" data-value="10" onclick="selectOpt('level','10',this)">⭐ 10いか</button>
        <button class="toggle-btn" data-value="20" onclick="selectOpt('level','20',this)">⭐⭐ 20いか</button>
      </div>
    </div>

    <div class="setup-section">
      <p class="setup-label">もんだいすう</p>
      <div class="toggle-group" id="tg-count">
        <button class="toggle-btn active" data-value="5" onclick="selectOpt('count','5',this)">5もん</button>
        <button class="toggle-btn" data-value="10" onclick="selectOpt('count','10',this)">10もん</button>
      </div>
    </div>

    <!-- 音声オン/オフ -->
    <div class="setup-section">
      <p class="setup-label">おんせい</p>
      <div class="toggle-group">
        <button class="toggle-btn active" id="mute-btn" onclick="toggleMute(this)">🔊 おんせい あり</button>
      </div>
    </div>

    <button class="btn-start" onclick="startGame()">🚀 スタート！</button>
  </div>
</div>

<!-- ===== ゲーム ===== -->
<div class="screen" id="screen-game">

  <!-- トップバー -->
  <div class="game-topbar">
    <button class="btn-quit" onclick="confirmQuit()">✕ やめる</button>
    <div class="game-prog-text"><span id="q-current">1</span> / <span id="q-total">10</span></div>
    <div class="game-score-text">⭐ <span id="q-score">0</span></div>
  </div>

  <!-- プログレスバー -->
  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- ↓ここからスクロール可能エリア↓ -->
  <div class="game-scroll-area">

    <!-- 問題 -->
    <div class="game-question-area">
      <p class="game-question-text" id="game-question-text">もんだい</p>
      <div class="game-animal-display" id="game-animal-display"></div>
    </div>

    <!-- 4択エリア -->
    <div id="area-4choice" class="answer-area">
      <div class="choices-grid" id="choices-grid"></div>
    </div>

    <!-- 入力エリア -->
    <div id="area-input" class="answer-area" style="display:none">
      <div class="numpad-display-box">
        <div class="numpad-display-text" id="numpad-display">？</div>
        <div class="numpad-unit">ひき</div>
      </div>
      <div class="numpad-grid">
        <button class="nb" onclick="numpadPress(7)">7</button>
        <button class="nb" onclick="numpadPress(8)">8</button>
        <button class="nb" onclick="numpadPress(9)">9</button>
        <button class="nb" onclick="numpadPress(4)">4</button>
        <button class="nb" onclick="numpadPress(5)">5</button>
        <button class="nb" onclick="numpadPress(6)">6</button>
        <button class="nb" onclick="numpadPress(1)">1</button>
        <button class="nb" onclick="numpadPress(2)">2</button>
        <button class="nb" onclick="numpadPress(3)">3</button>
        <button class="nb nb-del" onclick="numpadDelete()">⌫</button>
        <button class="nb" onclick="numpadPress(0)">0</button>
        <button class="nb nb-ok" onclick="numpadConfirm()">OK ✓</button>
      </div>
    </div>

  </div><!-- ↑スクロールエリア終わり↑ -->

  <!-- 正解/不正解オーバーレイ -->
  <div class="answer-overlay" id="answer-overlay" style="display:none">
    <div class="answer-overlay-card">
      <div class="answer-mark" id="answer-mark">○</div>
      <div class="answer-streak" id="answer-streak" style="display:none">
        🔥 <span id="streak-count">3</span>れんぞく！！
      </div>
      <div class="answer-formula" id="answer-formula">3 ＋ 4 ＝ 7</div>
      <button class="btn-next" onclick="nextQuestion()">つぎへ ▶</button>
    </div>
  </div>
</div>

<!-- ===== 最終結果 ===== -->
<div class="screen" id="screen-result">
  <!-- 虹 -->
  <div class="result-rainbow" id="result-rainbow" style="display:none">
    <div class="rainbow-stripe r1"></div>
    <div class="rainbow-stripe r2"></div>
    <div class="rainbow-stripe r3"></div>
    <div class="rainbow-stripe r4"></div>
    <div class="rainbow-stripe r5"></div>
    <div class="rainbow-stripe r6"></div>
    <div class="rainbow-stripe r7"></div>
  </div>

  <!-- 拍手エモジ浮遊コンテナ -->
  <div class="result-applause-container" id="result-applause"></div>

  <div class="result-content">
    <div class="result-emoji-big" id="result-emoji-big">🎉</div>
    <h2 class="result-title" id="result-title">すごい！</h2>
    <div class="result-score-display">
      <span id="result-score">0</span><span class="score-sep">／</span><span id="result-total">10</span>
    </div>
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>

    <div class="result-list" id="result-list"></div>

    <div class="result-buttons">
      <button class="btn-retry" onclick="startGame()">もう一度</button>
      <button class="btn-menu" onclick="showScreen('menu'); speak('また あそんでね！')">メニューへ</button>
    </div>
  </div>
</div>

<!-- ===== やめる確認ダイアログ（カスタム） ===== -->
<div id="quit-overlay" style="display:none">
  <div id="quit-card">
    <div class="quit-icon" id="quit-icon">😿</div>
    <p class="quit-title">やめちゃうの？</p>
    <p class="quit-sub">これまでのこたえは きえてしまうよ…</p>
    <button class="quit-btn-continue" onclick="closeQuitDialog()">▶ つづける！</button>
    <button class="quit-btn-leave" onclick="doQuit()">🏠 やめる</button>
  </div>
</div>

<!-- ===== ぜんぶメニューへ戻るボタン（ゲーム中・セットアップ中に表示） ===== -->
<a id="back-to-hub" href="../../index.html" style="display:none">
  <span class="hub-icon">🏠</span>ぜんぶメニュー
</a>

<script src="../../common/speech.js"></script>
<script src="app.js"></script>
</body>
</html>

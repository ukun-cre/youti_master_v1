<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>さんすう・おやつ・だいぼうけん</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../common/back-to-hub.css">
    <link rel="manifest" href="../../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <canvas id="confetti-canvas"></canvas>

        <div id="view-menu" class="view active">
            <h1>🍩 さんすうおやつ 🍎<br>だいぼうけん</h1>
            <div class="character-container" id="menu-characters"></div>
            <button class="btn btn-primary" onclick="app.startGame()">あそぼう！ (スタート)</button>
            <button class="btn btn-secondary" onclick="app.switchView('view-settings')">せってい</button>
            <button class="btn btn-secondary" onclick="app.switchView('view-records')">きろく</button>
        </div>

        <div id="view-settings" class="view">
            <h2>⚙️ せってい</h2>
            <div class="setting-group">
                <label>おと (BGM・こえ)</label>
                <button id="btn-sound" class="btn btn-toggle" onclick="app.toggleSound()">ON</button>
            </div>
            <div class="setting-group">
                <label>むずかしさ</label>
                <select id="select-level" onchange="app.saveSettings()">
                    <option value="1">レベル1 (5まで)</option>
                    <option value="2">レベル2 (10まで)</option>
                    <option value="3">レベル3 (20まで)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>もんだいすう</label>
                <select id="select-count" onchange="app.saveSettings()">
                    <option value="5">5もん</option>
                    <option value="7">7もん</option>
                    <option value="10">10もん</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="app.switchView('view-menu')">もどる</button>
        </div>

        <div id="view-records" class="view">
            <h2>🏆 きろく</h2>
            <div id="record-display" class="record-box">
                <span id="trophy-icon">🏆</span>
                <p>さいこうれんぞくせいかい</p>
                <h3 id="high-score">0 かい</h3>
            </div>
            <button class="btn btn-primary" onclick="app.switchView('view-menu')">もどる</button>
        </div>

        <div id="view-game" class="view">
            <div class="game-header">
                <span id="question-counter">1 / 5</span>
                <button class="btn btn-small" onclick="app.quitGame()">やめる</button>
            </div>

            <div id="character-reaction" class="character-container"></div>

            <div class="equation-container">
                <div id="equation-text">1 + 2 = ?</div>
            </div>

            <div id="snacks-container" class="snacks-area"></div>

            <div id="choices-container" class="choices-area">
                </div>
        </div>

        <div id="view-result" class="view">
            <canvas id="result-confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;"></canvas>
            <div class="result-neko" id="result-neko-char"></div>
            <div class="result-title-text" id="result-title">すごい！✨</div>
            <div class="result-score-card">
                <div class="result-score-label">せいかいすう</div>
                <div class="result-score-display">
                    <span id="result-correct" class="result-big-num">0</span>
                    <span class="result-divider"> / </span>
                    <span id="result-total" class="result-total-num">5</span>
                </div>
                <div id="result-stars" class="result-stars-row"></div>
            </div>
            <div id="result-badges" class="result-badges"></div>
            <button class="btn btn-primary" onclick="app.startGame()">🔄 もういちど！</button>
            <button class="btn btn-secondary" onclick="app.switchView('view-menu')">🏠 メニューへ</button>
        </div>
    </div>
    <!-- ===== ぜんぶメニューへ戻るボタン ===== -->
    <a id="back-to-hub" href="../../index.html">
      <span class="hub-icon">🏠</span>ぜんぶメニュー
    </a>

    <script src="app.js"></script>
</body>
</html>

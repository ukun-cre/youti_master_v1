<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF69B4">
    <title>ひらがな どっちかな？</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../common/back-to-hub.css">
    <link rel="manifest" href="../../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="app">
        <!-- ===== メニュー ===== -->
        <div id="menu-screen" class="screen active">
            <h1>🐶 ひらがな<br>どっちかな？ 🐱</h1>
            <p class="menu-desc">にたひらがなをくべつしよう！</p>
            <button class="btn primary-btn" onclick="no5App.startGame()">ゲームスタート！</button>
            <button class="btn secondary-btn" onclick="no5App.showScreen('records-screen')">きろく 🏆</button>
            <button class="btn settings-btn" onclick="no5App.showScreen('settings-screen')">せってい ⚙️</button>
        </div>

        <!-- ===== クイズ ===== -->
        <div id="quiz-screen" class="screen hidden">
            <div class="quiz-header">
                <div id="question-counter" class="q-counter">1 / 5</div>
                <div id="score-display" class="score-disp">⭐ 0</div>
                <button class="quit-small" onclick="no5App.quitGame()">✖</button>
            </div>
            <div class="character-area">
                <span id="char-emoji">🐶</span>
                <span id="char-msg">がんばれ！</span>
            </div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
            <div id="question-text" class="question-box">どっちかな？</div>
            <div class="choices">
                <button class="btn choice-btn" id="choice1" onclick="no5App.checkAnswer(1)"></button>
                <button class="btn choice-btn" id="choice2" onclick="no5App.checkAnswer(2)"></button>
            </div>
            <button class="btn speak-btn" onclick="no5App.speakCurrent()">🔊 もういちどきく</button>
            <div id="feedback-msg" class="feedback-msg"></div>
        </div>

        <!-- ===== 結果 ===== -->
        <div id="result-screen" class="screen hidden">
            <div id="result-neko" class="result-neko">🐶</div>
            <div id="result-title" class="result-title">すごい！✨</div>
            <div class="result-score-card">
                <div class="result-label">せいかいすう</div>
                <div class="result-nums">
                    <span id="res-correct" class="res-big">0</span>
                    <span class="res-sep"> / </span>
                    <span id="res-total" class="res-small">5</span>
                </div>
                <div id="res-stars" class="res-stars"></div>
            </div>
            <div id="res-badges" class="res-badges"></div>
            <button class="btn primary-btn" onclick="no5App.startGame()">🔄 もういちど！</button>
            <button class="btn secondary-btn" onclick="no5App.showScreen('menu-screen')">🏠 メニューへ</button>
        </div>

        <!-- ===== きろく ===== -->
        <div id="records-screen" class="screen hidden">
            <h2>🏆 きろく</h2>
            <div class="record-box">
                <span id="trophy-icon">🏆</span>
                <p>さいこうせいかい</p>
                <h3 id="high-score">0 もん</h3>
            </div>
            <div id="sticker-collection" class="sticker-grid"></div>
            <button class="btn primary-btn" onclick="no5App.showScreen('menu-screen')">もどる</button>
        </div>

        <!-- ===== せってい ===== -->
        <div id="settings-screen" class="screen hidden">
            <h2>せってい ⚙️</h2>
            <div class="setting-item">
                <label>おと（音声）</label>
                <input type="checkbox" id="sound-toggle" checked onchange="no5App.toggleSound()">
            </div>
            <div class="setting-item">
                <label>もんだいすう</label>
                <div class="count-buttons">
                    <button class="count-btn active" id="cnt-5" onclick="no5App.setCount(5)">5もん</button>
                    <button class="count-btn" id="cnt-7" onclick="no5App.setCount(7)">7もん</button>
                    <button class="count-btn" id="cnt-10" onclick="no5App.setCount(10)">10もん</button>
                </div>
            </div>
            <button class="btn primary-btn" onclick="no5App.showScreen('menu-screen')">もどる</button>
        </div>
    </div>

    <!-- ===== ぜんぶメニューへ戻るボタン ===== -->
    <a id="back-to-hub" href="../../index.html">
      <span class="hub-icon">🏠</span>ぜんぶメニュー
    </a>

    <script src="app.js"></script>
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('../../sw.js').catch(()=>{}); }</script>
</body>
</html>

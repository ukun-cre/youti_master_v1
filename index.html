<!DOCTYPE html>
<html lang="ja">
<head>

<body>

<!-- ===== 背景デコレーション ===== -->

  <div class="shape s3"></div>
  <div class="shape s4"></div>
  <div class="shape s5"></div>
</div>

<!-- ===== ヘッダー ===== -->

<!-- ===== アプリカード一覧 ===== -->
<main class="app-grid" id="appGrid">

  <!-- カード1: 漢字 -->
  <a href="apps/kanji/index.html" class="app-card app-card--kanji" aria-label="かんじだいすき">
    <div class="card-icon">📖</div>
    <div class="card-title">かんじ<br>だいすき！</div>
    <div class="card-desc">しょうがっこう1ねんせいの かんじを おぼえよう</div>
    <div class="card-badge">80じ</div>
  </a>

  <!-- カード2: 計算 -->
  <a href="apps/math/index.html" class="app-card app-card--math" aria-label="さんすうおやつだいぼうけん">
    <div class="card-icon">🍎</div>
    <div class="card-title">さんすう<br>おやつ！</div>
    <div class="card-desc">たしざん・ひきざんを おやつで れんしゅう</div>
    <div class="card-badge">20まで</div>
  </a>

  <!-- カード3: 10の組み合わせ -->
  <a href="apps/juucombo/index.html" class="app-card app-card--juucombo" aria-label="10のなかよし">

    <div class="card-desc">10になる かずの くみあわせを おぼえよう</div>
    <div class="card-badge">たして10</div>

<footer class="hub-footer">
  <span>🌟 まいにち すこしずつ おぼえよう！ 🌟</span>
</footer>

<script src="hub.js"></script>

  if ('serviceWorker' in navigator) {

</html>
